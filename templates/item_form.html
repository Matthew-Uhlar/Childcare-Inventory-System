{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 650px;">
    <h2>{% if item %}Edit Inventory Item{% else %}Add Inventory Item{% endif %}</h2>

    <form method="post">
        <label>Item Name</label>
        <input name="name" required value="{{ item.name if item else '' }}">

        <label>Category</label>
        <input name="category" required value="{{ item.category if item else '' }}">

        <label>Quantity</label>
        <input name="quantity" type="number" min="0" required value="{{ item.quantity if item else 0 }}">

        <label>Unit Type</label>
        <input name="unit_type" required value="{{ item.unit_type if item else '' }}" placeholder="boxes, packs, rolls">

        <label>Minimum Stock</label>
        <input name="minimum_stock" type="number" min="0" required value="{{ item.minimum_stock if item else 0 }}">

        <button type="submit">Save</button>
        <a class="button secondary" href="{{ url_for('inventory') }}">Cancel</a>
    </form>
</div>
{% endblock %}
